name: Build Image

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - pi-image/*

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - hyperpixel2r
    steps:
      - name: Update apt
        run: sudo apt-get update
      - name: Install Dependencies
        run: sudo apt install coreutils p7zip-full qemu-user-static python3-git
      - name: Checkout CustomPiOS
        uses: actions/checkout@v2
        with:
          repository: 'guysoft/CustomPiOS'
          path: CustomPiOS
      - name: Checkout Project Repository
        uses: actions/checkout@v2
        with:
          repository: ${{ github.repository }}
          path: repository
          submodules: true
      - name: Download Raspbian Image
        run: cd repository/src/image && wget -q -c --trust-server-names 'https://downloads.raspberrypi.org/raspios_lite_arm64_latest'
      - name: Update CustomPiOS Paths
        run: cd repository/src && ../../CustomPiOS/src/update-custompios-paths
      - name: Copy Fixes
        run: cp ./repository/pi-image/custom-config/common.sh ./CustomPiOS/src/common.sh
      - name: Build Image
        run: sudo modprobe loop && cd repository/src && sudo bash -x ./build_dist
