name: Build Image

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - piimage/*

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: guysoft/custompios:devel
      options: --privileged
      env:
        USER: root

    strategy:
      matrix:
        variant:
          - hyperpixel2r
    steps:
      - name: Checkout Project Repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: piimage/src
      - name: Build image
        working-directory: piimage/src
        env:
          BASE_WORKSPACE: ${{ github.workspace }}/piimage/src
          DIST_PATH: ${{ github.workspace }}/piimage/src
          BASE_BOARD: raspberrypiarm64
        run: |
          ls -a

          mkdir -p /distro
          build --download ${{ matrix.variant }}
