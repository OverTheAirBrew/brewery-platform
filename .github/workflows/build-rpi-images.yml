name: Build Image

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - piimage/*

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - hyperpixel2-round
        base_image:
          - https://downloads.raspberrypi.com/raspios_oldstable_lite_armhf/images/raspios_oldstable_lite_armhf-2024-10-28/2024-10-22-raspios-bullseye-armhf-lite.img.xz
    steps:
      - name: Checkout Project Repository
        uses: actions/checkout@v3
        with:
          sparse-checkout: |
            piimage
      - name: Checkout CustomPiOS
        uses: actions/checkout@v3
        with:
          repository: 'guysoft/CustomPiOS'
          path: CustomPiOS
      - name: Download Raspbian Image
        working-directory: piimage/src/image
        run: wget -q -c --trust-server-names '${{ matrix.base_image }}'
      - name: debugging
        working-directory: piimage/src
        run: |
          ls -la ../
          ls -la ../../
          ls -la ../../../
      - name: Update CustomPiOS path
        working-directory: piimage/src
        run: ../../CustomPiOS/update-custompios-paths
      - name: Build image
        working-directory: piimage/src
        run: |
          sudo modprobe loop
          sudo bash -x ./build_dist ${{ matrix.variant }}
